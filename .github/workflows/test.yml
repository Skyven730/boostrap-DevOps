name: CI Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-lastest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup node.js
        uses: sections/checkout@v6
        with:
          node-version: 16.13.x
          cache: npm
      - name: Install
        run: npm ci